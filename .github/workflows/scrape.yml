name: Scrape events

on:
  schedule:
    - cron: "0 */6 * * *"  # Hver 6. time
  workflow_dispatch: {}      # Manuell kjøring

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run scrapers
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          ODEON_PROXY_URL: ${{ secrets.ODEON_PROXY_URL }}
        run: python -m backend.generate

      - name: Commit and push events.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/events.json
          if git diff --cached --quiet; then
            echo "Ingen endringer i events.json"
          else
            git commit -m "oppdater events.json [skip ci]"
            git push
          fi
