services:
  - type: cron
    name: iaal-scraper
    runtime: python
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.aggregator
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TICKETMASTER_API_KEY
        sync: false
